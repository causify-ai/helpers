name: Lint GitHub Actions Workflows
on:
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run actionlint
        uses: rhysd/actionlint@v1.0.6
        with:
          scanner: workflow
